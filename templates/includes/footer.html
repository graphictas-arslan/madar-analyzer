<!-- ===== اسکریپت نشانگر فعال ===== -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // پیدا کردن آیتم فعال
        const activeItem = document.querySelector('.bottom-nav .nav-item.active');
        const indicator = document.getElementById('navIndicator');
        
        if (activeItem && indicator) {
            // فقط در دسکتاپ
            if (window.innerWidth >= 769) {
                const rect = activeItem.getBoundingClientRect();
                const navRect = document.querySelector('.bottom-nav').getBoundingClientRect();
                
                // محاسبه موقعیت نشانگر
                const topOffset = activeItem.offsetTop + (activeItem.offsetHeight / 2) - (48 / 2);
                indicator.style.top = topOffset + 'px';
                indicator.classList.add('show');
            }
        }

        // به‌روزرسانی نشانگر هنگام تغییر اندازه
        window.addEventListener('resize', function() {
            if (window.innerWidth >= 769) {
                const activeItem = document.querySelector('.bottom-nav .nav-item.active');
                const indicator = document.getElementById('navIndicator');
                
                if (activeItem && indicator) {
                    const topOffset = activeItem.offsetTop + (activeItem.offsetHeight / 2) - (48 / 2);
                    indicator.style.top = topOffset + 'px';
                    indicator.classList.add('show');
                }
            } else {
                const indicator = document.getElementById('navIndicator');
                if (indicator) {
                    indicator.classList.remove('show');
                }
            }
        });
    });
</script>

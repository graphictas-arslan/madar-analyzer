<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

    <meta charset="UTF-8">

    <title>ورود | مادر آنالیزر</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:tahoma;
        }

        body{

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:linear-gradient(
                135deg,
                #0f172a,
                #1e293b,
                #334155
            );

        }

        .login-box{

            width:400px;

            background:white;

            border-radius:20px;

            padding:40px;

            box-shadow:
            0 10px 40px rgba(0,0,0,.25);

        }

        .logo{

            text-align:center;

            margin-bottom:30px;

        }

        .logo h1{

            color:#0f172a;

            font-size:28px;

        }

        .logo p{

            color:#64748b;

            margin-top:10px;
        }

        .form-group{

            margin-bottom:20px;
        }

        label{

            display:block;

            margin-bottom:8px;

            color:#334155;
        }

        input{

            width:100%;

            padding:12px;

            border:1px solid #cbd5e1;

            border-radius:10px;

            font-size:15px;
        }

        input:focus{

            outline:none;

            border-color:#2563eb;
        }

        button{

            width:100%;

            border:none;

            padding:14px;

            border-radius:10px;

            background:#2563eb;

            color:white;

            font-size:16px;

            cursor:pointer;

            transition:.3s;
        }

        button:hover{

            background:#1d4ed8;
        }

        .footer{

            text-align:center;

            margin-top:20px;

            color:#94a3b8;

            font-size:13px;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <div class="logo">

            <h1>🚀 مادر آنالیزر</h1>

            <p>
                سامانه تحلیل و مدیریت محتوا
            </p>

        </div>

        <form method="POST">

            <div class="form-group">

                <label>
                    نام کاربری
                </label>

                <input
                    type="text"
                    name="username"
                    required
                >

            </div>

            <div class="form-group">

                <label>
                    رمز عبور
                </label>

                <input
                    type="password"
                    name="password"
                    required
                >

            </div>

            <button type="submit">
                ورود به پنل
            </button>

        </form>

        <div class="footer">

            Mother Analyzer © 2026

        </div>

    </div>

</body>
</html>

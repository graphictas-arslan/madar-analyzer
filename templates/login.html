<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود | مادر آنالیزر</title>
    <style>
        /* ========== تنظیمات پایه ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f1115;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            direction: rtl;
        }

        /* ========== کارت لاگین ========== */
        .login-card {
            background: #1a1d23;
            border-radius: 20px;
            padding: 32px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        /* ========== لوگو ========== */
        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        .logo p {
            color: #a0a0a0;
            font-size: 13px;
            margin-top: 6px;
        }

        /* ========== فیلدهای ورودی ========== */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            color: #a0a0a0;
            font-size: 12px;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            background: #0f1115;
            border: 1px solid #2a2d33;
            border-radius: 10px;
            color: #ffffff;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #f97316;
        }

        .form-group input::placeholder {
            color: #555;
        }

        /* ========== دکمه ========== */
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #f97316;
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: #ea580c;
        }

        /* ========== فلش مسیج ========== */
        .alert {
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
        }

        .alert-danger {
            background: #3a1a1a;
            color: #f87171;
            border: 1px solid #4a1a1a;
        }

        .alert-success {
            background: #1a3a2a;
            color: #4ade80;
            border: 1px solid #1a4a2a;
        }

        /* ========== فوتر ========== */
        .footer {
            text-align: center;
            color: #555;
            font-size: 12px;
            margin-top: 20px;
        }

        /* ========== واکنش‌گرا ========== */
        @media (max-width: 480px) {
            .login-card {
                padding: 24px;
                margin: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <!-- لوگو -->
        <div class="logo">
            <h1>🚀 مادر آنالیزر</h1>
            <p>سامانه تحلیل و مدیریت محتوا</p>
        </div>

        <!-- نمایش پیام‌ها -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- فرم لاگین -->
        <form method="POST">
            <div class="form-group">
                <label>نام کاربری</label>
                <input type="text" name="username" placeholder="نام کاربری خود را وارد کنید" required>
            </div>
            <div class="form-group">
                <label>رمز عبور</label>
                <input type="password" name="password" placeholder="رمز عبور خود را وارد کنید" required>
            </div>
            <button type="submit" class="btn-login">ورود به پنل</button>
        </form>

        <!-- فوتر -->
        <div class="footer">
            مادر آنالیزر © 2026
        </div>
    </div>
</body>
</html>

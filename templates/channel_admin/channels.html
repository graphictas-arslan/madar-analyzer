{% extends "channel_admin/base.html" %}
{% block title %}کانال‌های من{% endblock %}
{% block content %}
<div class="container mt-4">
    <h2>📢 کانال‌های من</h2>
    <div class="row">
        {% for channel in channels %}
        <div class="col-md-4 mb-3">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">{{ channel.channel_name }}</h5>
                    <p class="card-text text-muted">شناسه: {{ channel.channel_id }}</p>
                    <a href="/channel-admin/channels/{{ channel.id }}/posts" class="btn btn-primary">
                        مشاهده پست‌ها
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}

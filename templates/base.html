<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Madar Analyzer{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- هدر -->
        <div class="header">
            <div class="title">🚀 مادر آنالیزر</div>
            <div>
                <span class="badge">۳</span>
            </div>
        </div>

        <!-- محتوای اصلی -->
        {% block content %}{% endblock %}
    </div>

    <!-- نوار پایین (مستقل و ساده) -->
    <nav class="bottom-nav">
        <a href="/dashboard" class="nav-item">
            <i class="fas fa-home"></i>
            <span>خانه</span>
        </a>
        <a href="/dashboard/channels" class="nav-item">
            <i class="fas fa-bullhorn"></i>
            <span>کانال‌ها</span>
        </a>
        <a href="/dashboard/posts" class="nav-item">
            <i class="fas fa-file-alt"></i>
            <span>پست‌ها</span>
        </a>
        <a href="/users" class="nav-item">
            <i class="fas fa-user"></i>
            <span>پروفایل</span>
        </a>
        <a href="/auth/logout" class="nav-item">
            <i class="fas fa-sign-out-alt"></i>
            <span>خروج</span>
        </a>
    </nav>
</body>
</html>

{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-2">
    <h3 style="font-size: 18px;">📊 مدیریت پست‌ها</h3>
    <button class="btn btn-orange btn-sm">
        <i class="fas fa-file-excel"></i> اکسل
    </button>
</div>

<!-- لیست افقی پست‌ها -->
<div class="horizontal-scroll mb-3">
    {% for post in posts %}
    <div class="post-card">
        {% if post.media_url %}
            <img src="{{ post.media_url }}" alt="post image">
        {% else %}
            <div style="height: 90px; background: #2a2d33; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-file-alt fa-2x" style="color: #666;"></i>
            </div>
        {% endif %}
        <div class="title">{{ post.text[:30] }}...</div>
        <div class="meta">
            <span>{{ post.channel.channel_name if post.channel else '-' }}</span>
            <span>⭐ {{ post.score or '-' }}</span>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}

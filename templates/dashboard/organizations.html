{% extends "base.html" %}
{% block title %}سازمان‌ها{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>🏢 سازمان‌ها</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createOrganizationModal">
        <i class="fas fa-plus"></i> سازمان جدید
    </button>
</div>

<div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
    {% for org in organizations %}
    <div class="col">
        <div class="card h-100 shadow-sm">
            <div class="card-body text-center">
                <div class="mb-3">
                    <i class="fas fa-building fa-3x text-primary"></i>
                </div>
                <h5 class="card-title">{{ org.name }}</h5>
                <p class="text-muted small">{{ org.description or 'بدون توضیحات' }}</p>
                <div class="d-flex justify-content-between px-3 mb-3">
                    <div>
                        <span class="badge bg-light text-dark">📄 {{ org.channel_count }} کانال</span>
                    </div>
                    <div>
                        <span class="badge bg-{{ 'success' if org.avg_score >= 70 else 'warning' if org.avg_score >= 40 else 'danger' }}">
                            ⭐ {{ org.avg_score }}
                        </span>
                    </div>
                </div>
                <a href="/dashboard/organizations/{{ org.id }}/channels" class="btn btn-outline-primary btn-sm w-100">
                    <i class="fas fa-arrow-left"></i> ورود به سازمان
                </a>
            </div>
            <div class="card-footer bg-white text-center">
                <a href="/dashboard/organizations/toggle/{{ org.id }}" class="btn btn-sm btn-warning">
                    <i class="fas fa-toggle-{{ 'on' if org.is_active else 'off' }}"></i>
                </a>
                <a href="/dashboard/organizations/delete/{{ org.id }}" class="btn btn-sm btn-danger" onclick="return confirm('آیا مطمئن هستید؟')">
                    <i class="fas fa-trash"></i>
                </a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<!-- مودال ایجاد سازمان -->
<div class="modal fade" id="createOrganizationModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">سازمان جدید</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form method="POST" action="/dashboard/organizations/create">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">نام سازمان</label>
                        <input type="text" class="form-control" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">توضیحات</label>
                        <textarea class="form-control" name="description" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">لغو</button>
                    <button type="submit" class="btn btn-primary">ذخیره</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

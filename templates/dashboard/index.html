<!-- کارت آمار دایره‌ای -->
<div class="card">
    <div class="row g-2 justify-content-center">
        <div class="col-3">
            <div class="stat-circle circle-blue">
                <div class="number">{{ total_posts }}</div>
                <div class="label">پست‌ها</div>
            </div>
        </div>
        <div class="col-3">
            <div class="stat-circle circle-orange">
                <div class="number">{{ total_channels }}</div>
                <div class="label">کانال‌ها</div>
            </div>
        </div>
        <div class="col-3">
            <div class="stat-circle circle-green">
                <div class="number">{{ scored_posts }}</div>
                <div class="label">امتیازدار</div>
            </div>
        </div>
        <div class="col-3">
            <div class="stat-circle circle-purple">
                <div class="number">{{ avg_score }}</div>
                <div class="label">میانگین</div>
            </div>
        </div>
    </div>
</div>

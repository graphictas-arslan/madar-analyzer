{% extends "base.html" %}

{% block title %}
داشبورد
{% endblock %}

{% block content %}

<div class="row">

    <div class="col-lg-3 col-md-6 mb-4">

        <div class="card-custom">

            <div class="card-title">
                کانال‌ها
            </div>

            <div class="card-number">
                0
            </div>

        </div>

    </div>

    <div class="col-lg-3 col-md-6 mb-4">

        <div class="card-custom">

            <div class="card-title">
                پست‌ها
            </div>

            <div class="card-number">
                0
            </div>

        </div>

    </div>

    <div class="col-lg-3 col-md-6 mb-4">

        <div class="card-custom">

            <div class="card-title">
                سازمان‌ها
            </div>

            <div class="card-number">
                0
            </div>

        </div>

    </div>

    <div class="col-lg-3 col-md-6 mb-4">

        <div class="card-custom">

            <div class="card-title">
                کاربران
            </div>

            <div class="card-number">

        </div>

    </div>

</div>

            </tr>

        </tbody>

    </table>

</div>

<br>

<div class="card-custom">

    <h4 style="margin-bottom:20px;">

    <table class="table">

        <thead>

            <tr>

                <th>کاربر</th>

                <th>عملیات</th>

                <th>زمان</th>

            </tr>

        </thead>

        <tbody>

            <tr>

                <td colspan="3" style="text-align:center;">
                    فعالیتی وجود ندارد.
                </td>

            </tr>

        </tbody>

    </table>

</div>

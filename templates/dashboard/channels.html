{% extends "base.html" %}
{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
    <h2 style="font-size: 18px; margin: 0;">📢 کانال‌ها</h2>
    <button style="background: #f97316; border: none; border-radius: 8px; padding: 6px 14px; color: #fff; font-size: 12px; cursor: pointer;" data-bs-toggle="modal" data-bs-target="#createChannelModal">
        <i class="fas fa-plus"></i> جدید
    </button>
</div>

<!-- لیست کانال‌ها به صورت ۲×۲ -->
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
    {% for channel in channels %}
    <div style="background: #1a1d23; border-radius: 12px; padding: 12px; position: relative;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <div style="font-size: 14px; font-weight: 600;">{{ channel.channel_name }}</div>
                <div style="font-size: 10px; color: #a0a0a0;">شناسه: {{ channel.channel_id }}</div>
            </div>
            <div>
                <span style="display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 10px; background: {% if channel.is_active %}#1a3a2a; color: #4ade80;{% else %}#3a1a1a; color: #f87171;{% endif %};">
                    {{ 'فعال' if channel.is_active else 'غیرفعال' }}
                </span>
            </div>
        </div>
        <div style="display: flex; gap: 4px; margin-top: 8px;">
            <a href="/dashboard/channels/toggle/{{ channel.id }}" style="background: #f59e0b; border: none; border-radius: 6px; padding: 3px 10px; color: #fff; font-size: 10px; text-decoration: none; cursor: pointer;">
                تغییر وضعیت
            </a>
            <a href="/dashboard/channels/delete/{{ channel.id }}" style="background: #ef4444; border: none; border-radius: 6px; padding: 3px 10px; color: #fff; font-size: 10px; text-decoration: none; cursor: pointer;" onclick="return confirm('حذف شود؟')">
                حذف
            </a>
        </div>
    </div>
    {% endfor %}
</div>

<!-- مودال ایجاد کانال -->
<div class="modal fade" id="createChannelModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content" style="background: #1a1d23; color: #fff;">
            <div class="modal-header" style="border-bottom: 1px solid #2a2d33;">
                <h5 class="modal-title" style="margin: 0;">کانال جدید</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form method="POST" action="/dashboard/channels/create">
                <div class="modal-body">
                    <div style="margin-bottom: 8px;">
                        <label style="display: block; color: #a0a0a0; font-size: 12px; margin-bottom: 4px;">نام کانال</label>
                        <input type="text" class="form-control" name="channel_name" required style="width: 100%; padding: 8px 12px; background: #0f1115; border: 1px solid #2a2d33; border-radius: 8px; color: #fff; font-size: 13px;">
                    </div>
                    <div style="margin-bottom: 8px;">
                        <label style="display: block; color: #a0a0a0; font-size: 12px; margin-bottom: 4px;">شناسه کانال</label>
                        <input type="text" class="form-control" name="channel_id" required style="width: 100%; padding: 8px 12px; background: #0f1115; border: 1px solid #2a2d33; border-radius: 8px; color: #fff; font-size: 13px;">
                    </div>
                </div>
                <div class="modal-footer" style="border-top: 1px solid #2a2d33; padding-top: 12px;">
                    <button type="button" class="btn btn-outline" data-bs-dismiss="modal" style="background: transparent; border: 1px solid #2a2d33; border-radius: 8px; padding: 6px 14px; color: #a0a0a0;">لغو</button>
                    <button type="submit" class="btn btn-orange" style="background: #f97316; border: none; border-radius: 8px; padding: 6px 14px; color: #fff;">ذخیره</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

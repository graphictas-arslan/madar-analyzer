{% extends "base.html" %}
{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
    <h2 style="font-size: 18px; margin: 0;">📢 کانال‌ها</h2>
    <span style="font-size: 11px; color: #a0a0a0;">{{ channels|length }} کانال</span>
</div>

<!-- لیست کانال‌ها به صورت ۲×۲ -->
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
    {% for channel in channels %}
    <!-- کل کادر لینک به صفحه پست‌ها -->
    <a href="/dashboard/channels/{{ channel.id }}/posts" 
       style="background: #1a1d23; border-radius: 12px; padding: 20px 12px; text-decoration: none; display: block; position: relative; transition: 0.2s;"
       onmouseover="this.style.background='#2a2d33'"
       onmouseout="this.style.background='#1a1d23'">
        
        <!-- نام کانال در وسط -->
        <div style="text-align: center; margin-bottom: 16px;">
            <div style="font-size: 18px; font-weight: 600; color: #ffffff;">{{ channel.channel_name }}</div>
        </div>

        <!-- آیکون‌های عملیات (پایین) -->
        <div style="display: flex; justify-content: center; gap: 16px; margin-top: 8px;">
            <!-- تغییر وضعیت -->
            <a href="/dashboard/channels/toggle/{{ channel.id }}" 
               onclick="event.stopPropagation()"
               style="color: #f59e0b; font-size: 18px; text-decoration: none;">
                <i class="fas {% if channel.is_active %}fa-toggle-on{% else %}fa-toggle-off{% endif %}"></i>
            </a>

            <!-- اختصاص ادمین -->
            <a href="/dashboard/channels/assign/{{ channel.id }}" 
               onclick="event.stopPropagation()"
               style="color: #3b82f6; font-size: 18px; text-decoration: none;">
                <i class="fas fa-user-plus"></i>
            </a>

            <!-- حذف -->
            <a href="/dashboard/channels/delete/{{ channel.id }}" 
               onclick="event.stopPropagation(); return confirm('حذف شود؟')"
               style="color: #ef4444; font-size: 18px; text-decoration: none;">
                <i class="fas fa-trash"></i>
            </a>
        </div>
    </a>
    {% endfor %}
</div>
{% endblock %}
